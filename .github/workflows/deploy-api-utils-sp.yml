name: "SP - Build and deploy Utils lambda & test services API"

on:
  push:
    branches:
      - main
    paths-ignore:
      - "ci/cloudformation/account-management/**"
      - "ci/cloudformation/account-data/**"
      - "ci/cloudformation/stubs/**"
      - "ci/cloudformation/auth/**"
      - "template.yaml"
      - "ci/openAPI/**"
      - "docs/**"
      - "**/README.md"
      - "integration-tests/**"
      - "delivery-receipts-integration-tests/**"
      - "local-running/**"
      - "notifications/**"
      - "quality-gate.manifest.json"
      - "frontend-api/**"
      - "account-management-api/**"
      - "account-management-integration-tests/**"
      - "account-data-api/**"
      - "account-data-api-integration-tests/**"
      - "ticf-cri-stub/**"
      - "interventions-api-stub/**"
      - "ipv-api/**"
      - "oidc-api/**"
      - "sis-api/**"

env:
  AWS_REGION: eu-west-2
  JAVA_VERSION: 17
  JAVA_DISTRIBUTION: corretto
  RAIN_VERSION: v1.23.0
  RAIN_ARCH: linux-amd64

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up SAM cli
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v2
        with:
          use-installer: true
          version: 1.159.1

      - name: Set up AWS creds
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.GH_ACTIONS_UT_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v4
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Gradle build
        run: |
          ./gradlew --no-daemon --parallel :utils:buildZip :test-services-api:buildZip

      - name: Install Rain
        env:
          VERSION: ${{ env.RAIN_VERSION }}
          ARCH: ${{ env.RAIN_ARCH }}
        run: |
          wget -q "https://github.com/aws-cloudformation/rain/releases/download/${VERSION}/rain-${VERSION}_${ARCH}.zip"
          unzip "rain-${VERSION}_${ARCH}.zip"
          chmod +x "rain-${VERSION}_${ARCH}/rain"
          mv "rain-${VERSION}_${ARCH}/rain" /usr/local/bin/rain

      - name: Generate utils template
        run: "./scripts/merge-templates.sh"
        env:
          TEMPLATE_SOURCE_DIR: ci/cloudformation/utils
          TEMPLATE_FILE: utils-template.yaml

      - name: SAM build
        run: |
          sam validate --lint -t utils-template.yaml
          sam build --parallel -t utils-template.yaml

      - name: Extract PR number and commit message
        id: version_info
        run: |
          HEAD_MESSAGE=$(git log -1 --format=%s)
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "$HEAD_MESSAGE" =~ \(#([0-9]+)\) ]]; then
            VERSION="#${BASH_REMATCH[1]} - ${HEAD_MESSAGE}"
          else
            VERSION="${SHORT_SHA}${HEAD_MESSAGE:+: $HEAD_MESSAGE}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Deploy SAM app
        uses: govuk-one-login/devplatform-upload-action@64e46134b4108ebfa1cf2a64fee00782f8e2e8cf # v4.1.0
        with:
          artifact-bucket-name: ${{ secrets.ARTIFACT_SOURCE_UT_BUCKET_NAME }}
          signing-profile-name: ${{ secrets.SIGNING_PROFILE_NAME }}
          working-directory: .aws-sam/build
          version: ${{ steps.version_info.outputs.version }}
