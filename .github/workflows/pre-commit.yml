name: pre-commit

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
  push:
    branches:
      - main
  merge_group:

jobs:
  noop-on-merge-group:
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    name: Run pre-commit # important this is the same name as the pre-commit job
    steps:
      - name: 🛑 Skip Pre-commit Checks for Merge Group
        run: echo "This is a merge group event. Skipping pre-commit checks."; true
        shell: bash
  pre-commit:
    # This job will run on all pull requests and pushes to main, but not on merge groups
    # We run it on merge to main to ensure that pre-commit's cache is up to date
    if: github.event_name != 'merge_group'
    runs-on: ubuntu-latest
    name: Run pre-commit # important this is the same name as the noop-on-merge-group job
    steps:
      - name: 📦 Check Out Repository Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: 🏗️ Set Up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a #v5.5.0
        with:
          java-version: "17"
          distribution: "corretto"

      - name: 🏗️ Set Up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v4
        with:
          cache-read-only: false
          add-job-summary: never

      - name: 🏗️ Set Up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: "pip"

      - name: 🏗️ Install rain
        env:
          RAIN_VERSION: v1.20.1
        run: |
          wget -q "https://github.com/aws-cloudformation/rain/releases/download/${RAIN_VERSION}/rain-${RAIN_VERSION}_linux-amd64.zip"
          unzip "rain-${RAIN_VERSION}_linux-amd64.zip"
          chmod +x "rain-${RAIN_VERSION}_linux-amd64/rain"
          mv "rain-${RAIN_VERSION}_linux-amd64/rain" /usr/local/bin/rain
          rain --version
        shell: bash

      - name: 🏗️ Set Up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: 🏗️ Install Pre-commit
        run: |
          python -m pip install pre-commit==4.6.0 --only-binary=:all:
        shell: bash
      - name: 🛠️ Freeze Python Dependencies
        run: python -m pip freeze --local
        shell: bash
      - name: 📦 Cache Pre-commit tools
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-3|${{ env.pythonLocation }}|${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-3|${{ env.pythonLocation }}|
            pre-commit-3|
      - name: ✅ Run Pre-commit Hooks
        run: |
          pre-commit run --show-diff-on-failure --color=always \
          --from-ref "${{ github.event.pull_request.base.sha }}" \
          --to-ref "${{ github.event.pull_request.head.sha }}"
        shell: bash
      - name: 🧹 Cache Cleanup
        run: pre-commit gc
        shell: bash
