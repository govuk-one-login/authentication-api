AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Resources:
  test2Function:
    Type: AWS::Serverless::Function
    # checkov:skip=CKV_AWS_117: Lambda needs to exist outside our VPC so default AWS Lambda service VPC is OK
    Properties:
      FunctionName: test2Function
      AutoPublishAlias: latest
      CodeUri: ../account-management-api/build/distributions/account-management-api.zip
      Runtime: java17
      Handler: "uk.gov.di::handleRequest"
      LoggingConfig:
        LogGroup: !Ref test2FunctionLogGroup
      SnapStart:
        ApplyOn: PublishedVersions
      Tags:
        CheckovRulesToSkip: CKV_AWS_115.CKV_AWS_116.CKV_AWS_117

  test2FunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/test2-lambda
      RetentionInDays: 30
