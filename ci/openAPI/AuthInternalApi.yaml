---
openapi: 3.0.1
info:
  title: "Authentication Internal API"
  version: "1.0.0"
paths:
  /.well-known/mfa-reset-jwk.json:
    get:
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MfaResetStorageTokenJwkFunction.Arn}:active/invocations
        passthroughBehavior: "when_no_match"
        timeoutInMillis: 29000
  /.well-known/reverification-jwk.json:
    get:
      x-amazon-apigateway-integration:
        type: "aws_proxy"
        httpMethod: "POST"
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MfaResetJarJwkFunction.Arn}:active/invocations
        passthroughBehavior: "when_no_match"
        timeoutInMillis: 29000
  /.well-known/amc-jwks.json:
    get:
      responses:
        "200":
          description: "Successfully retrieved JWKS"
          content:
            application/json:
              schema:
                type: string
        "400":
          description: "Bad Request / Forbidden"
        "404":
          description: "JWKS file not found"
        "500":
          description: "Internal Server Error"
      x-amazon-apigateway-integration:
        type: "aws"
        httpMethod: "GET"
        credentials:
          Fn::GetAtt: [AuthInternalApiS3ExecutionRole, Arn]
        uri:
          Fn::Sub:
            - "arn:aws:apigateway:${AWS::Region}:s3:path/${Env}-amc-jwks/.well-known/amc-jwks.json"
            - Env:
                Fn::If:
                  - UseSubEnvironment
                  - Ref: SubEnvironment
                  - Ref: Environment
        passthroughBehavior: "when_no_match"
        responses:
          "404":
            statusCode: "404"
            selectionPattern: "404"
          "400":
            statusCode: "400"
            selectionPattern: "4\\d{2}" # Regex for any 4XX status
          "500":
            statusCode: "500"
            selectionPattern: "5\\d{2}" # Regex for any 5XX status
          default:
            statusCode: "200"
