# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Runtime: java17
    MemorySize: 4096
    Timeout: 900
    Architectures:
      - x86_64
    CodeSigningConfigArn: !If
      - UseCodeSigning
      - !Ref CodeSigningConfigArn
      - !Ref AWS::NoValue
    PermissionsBoundary: !If
      - UsePermissionsBoundary
      - !Ref PermissionsBoundary
      - !Ref AWS::NoValue
    DeploymentPreference:
      Enabled: true
      Type: !Ref LambdaDeploymentPreference
      Role: !GetAtt CodeDeployServiceRole.Arn
    Environment:
      Variables:
        ENVIRONMENT:
          !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]

Resources:
  # ============================================================================
  # KMS Key for CloudWatch Logs Encryption
  # ============================================================================
  # This key is used by Lambda functions to encrypt CloudWatch logs
  # Mirrors the MainKmsKey pattern from account-management stack

  MainKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS Key that Lambda uses to encrypt and decrypt function's environment variables and logs
      EnableKeyRotation: true
      KeyPolicy:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: "*"
          - Effect: Allow
            Principal:
              Service: !Sub logs.${AWS::Region}.amazonaws.com
            Action:
              - kms:Encrypt*
              - kms:Decrypt*
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:Describe*
            Resource: "*"
            Condition:
              ArnLike:
                kms:EncryptionContext:aws:logs:arn: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*

  MainKmsKeyAlias:
    Type: "AWS::KMS::Alias"
    Properties:
      AliasName: !Sub
        - "alias/${Env}-utils-main-kms-alias"
        - Env: !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]
      TargetKeyId: !Ref MainKmsKey

  # ============================================================================
  # CodeDeploy Service Role
  # ============================================================================
  # CodeDeploy Service Role for gradual Lambda deployments
  CodeDeployServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Action:
              - sts:AssumeRole
            Effect: Allow
            Principal:
              Service:
                - codedeploy.amazonaws.com
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSCodeDeployRoleForLambda
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue

  # Placeholder for resources - will be defined in separate template files
  # Resources will include:
  # - Lambda functions (lambda-functions.yaml)
  # - IAM roles and policies (iam-roles.yaml)
  # - S3 buckets (s3-buckets.yaml)
  # - CloudWatch schedules (cloudwatch-schedules.yaml)
  # - SQS mappings (sqs-mappings.yaml)
  # - CloudWatch logs and alarms (cloudwatch-logs.yaml)
  # - Outputs (outputs.yaml)

  # Placeholder resource to make template valid
  UtilsStackPlaceholder:
    Type: AWS::CloudFormation::WaitConditionHandle

Outputs:
  StackName:
    Description: The name of this CloudFormation stack
    Value: !Ref AWS::StackName
    Export:
      Name: !Sub "${AWS::StackName}-StackName"

  EnvironmentName:
    Description: The resolved environment name (considering SubEnvironment)
    Value: !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]
    Export:
      Name: !Sub
        - "${EnvironmentName}-utils-environment-name"
        - EnvironmentName:
            !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]
