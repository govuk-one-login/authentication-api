Resources:
  BulkUserEmailSendLambda:
    Type: AWS::Serverless::Function
    Condition: BulkEmailSendingEnabled
    Properties:
      FunctionName: !Sub
        - "${EnvironmentName}-bulk-user-email-send-lambda"
        - EnvironmentName:
            !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]
      CodeUri: ./utils/build/distributions/utils.zip
      Handler: uk.gov.di.authentication.utils.lambda.BulkUserEmailSendHandler::handleRequest
      Timeout: 110
      Policies:
        - !Ref LambdaBasicExecutionPolicy
        - !Ref DynamoBulkEmailTablesAccessPolicy
        - !Ref DynamoUserReadAccessPolicy
        - !Ref DynamoCredentialReadAccessPolicy
        - !Ref SourceCodeBucketReadAccessPolicy
        - !Ref SecretsManagerNotifyAccessPolicy
        - !Ref EmailCheckResultsTableKmsAccessPolicy
        - !Ref CloudWatchLogsKmsAccessPolicy
      AutoPublishAlias: live
      LoggingConfig:
        LogGroup: !Ref BulkUserEmailSendLogGroup
      Environment:
        Variables:
          ENVIRONMENT:
            !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]
          NOTIFY_URL: !If
            - UseSubEnvironment
            - !FindInMap [
                EnvironmentConfiguration,
                !Ref SubEnvironment,
                notifyUrl,
              ]
            - !FindInMap [EnvironmentConfiguration, !Ref Environment, notifyUrl]
          NOTIFY_TEMPLATE_MAP: !If
            - UseSubEnvironment
            - !FindInMap [
                EnvironmentConfiguration,
                !Ref SubEnvironment,
                notifyTemplateMap,
              ]
            - !FindInMap [
                EnvironmentConfiguration,
                !Ref Environment,
                notifyTemplateMap,
              ]
          BULK_USER_EMAIL_BATCH_SIZE: !If
            - UseSubEnvironment
            - !FindInMap [
                EnvironmentConfiguration,
                !Ref SubEnvironment,
                bulkEmailBatchSize,
              ]
            - !FindInMap [
                EnvironmentConfiguration,
                !Ref Environment,
                bulkEmailBatchSize,
              ]
          BULK_USER_EMAIL_SEND_MODE: !If
            - UseSubEnvironment
            - !FindInMap [
                EnvironmentConfiguration,
                !Ref SubEnvironment,
                bulkEmailSendMode,
              ]
            - !FindInMap [
                EnvironmentConfiguration,
                !Ref Environment,
                bulkEmailSendMode,
              ]
          BULK_USER_EMAIL_SENDER_TYPE: !If
            - UseSubEnvironment
            - !FindInMap [
                EnvironmentConfiguration,
                !Ref SubEnvironment,
                bulkEmailSenderType,
              ]
            - !FindInMap [
                EnvironmentConfiguration,
                !Ref Environment,
                bulkEmailSenderType,
              ]
          BULK_USER_EMAIL_EMAIL_SENDING_ENABLED: !If
            - UseSubEnvironment
            - !FindInMap [
                EnvironmentConfiguration,
                !Ref SubEnvironment,
                bulkEmailSendingEnabled,
              ]
            - !FindInMap [
                EnvironmentConfiguration,
                !Ref Environment,
                bulkEmailSendingEnabled,
              ]
      Events:
        ScheduledEvent:
          Type: Schedule
          Properties:
            Schedule: !If
              - UseSubEnvironment
              - !FindInMap [
                  EnvironmentConfiguration,
                  !Ref SubEnvironment,
                  bulkEmailSendScheduleExpression,
                ]
              - !FindInMap [
                  EnvironmentConfiguration,
                  !Ref Environment,
                  bulkEmailSendScheduleExpression,
                ]
            Description: Triggers bulk user email send Lambda on schedule
            Enabled: !Equals
              - !If
                - UseSubEnvironment
                - !FindInMap [
                    EnvironmentConfiguration,
                    !Ref SubEnvironment,
                    bulkEmailSendScheduleState,
                  ]
                - !FindInMap [
                    EnvironmentConfiguration,
                    !Ref Environment,
                    bulkEmailSendScheduleState,
                  ]
              - ENABLED
      Tags:
        Name: !Sub
          - "${EnvironmentName}-bulk-user-email-send-lambda"
          - EnvironmentName:
              !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]
        Environment:
          !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]

  BulkUserEmailSendLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: BulkEmailSendingEnabled
    Properties:
      LogGroupName: !Sub
        - "/aws/lambda/${EnvironmentName}-bulk-user-email-send-lambda"
        - EnvironmentName:
            !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]
      RetentionInDays: !If
        - UseSubEnvironment
        - !FindInMap [
            EnvironmentConfiguration,
            !Ref SubEnvironment,
            logRetentionDays,
          ]
        - !FindInMap [
            EnvironmentConfiguration,
            !Ref Environment,
            logRetentionDays,
          ]
      KmsKeyId: !GetAtt MainKmsKey.Arn

  BulkUserEmailSendLogSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Condition: BulkEmailSendingEnabledAndSplunkEnabled
    Properties:
      LogGroupName: !Ref BulkUserEmailSendLogGroup
      FilterPattern: ""
      DestinationArn: !Ref LoggingSubscriptionEndpointArn

  BulkUserEmailSendErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: BulkEmailSendingEnabledAndUseAlarmActions
    Properties:
      AlarmName: !Sub
        - "${EnvironmentName}-bulk-user-email-send-lambda-errors"
        - EnvironmentName:
            !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]
      AlarmDescription: Triggers when bulk user email send Lambda error rate exceeds threshold
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 900
      EvaluationPeriods: 1
      Threshold: !If
        - UseSubEnvironment
        - !FindInMap [
            EnvironmentConfiguration,
            !Ref SubEnvironment,
            lambdaErrorThreshold,
          ]
        - !FindInMap [
            EnvironmentConfiguration,
            !Ref Environment,
            lambdaErrorThreshold,
          ]
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref BulkUserEmailSendLambda
      TreatMissingData: notBreaching
