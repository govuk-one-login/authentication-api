Resources:
  InactiveAccountDataExportLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub
        - "${EnvironmentName}-inactive-account-data-export-lambda"
        - EnvironmentName:
            !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]
      CodeUri: ./utils/build/distributions/utils.zip
      Handler: uk.gov.di.authentication.utils.lambda.InactiveAccountDataExportHandler::handleRequest
      ReservedConcurrentExecutions: 1
      Environment:
        Variables:
          ENVIRONMENT:
            !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]
          DYNAMO_ARN_PREFIX: !Sub
            - "arn:aws:dynamodb:${AWS::Region}:${DataStoreAccountId}:table/"
            - DataStoreAccountId:
                !FindInMap [
                  EnvironmentConfiguration,
                  !Ref Environment,
                  dataStoreAccountId,
                ]
          INACTIVE_ACCOUNT_EXPORT_PARALLELISM:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              inactiveAccountExportParallelism,
            ]
          INACTIVE_ACCOUNT_EXPORT_TOTAL_SEGMENTS:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              inactiveAccountExportTotalSegments,
            ]
          INACTIVE_ACCOUNT_EXPORT_MAX_RETRIES:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              inactiveAccountExportMaxRetries,
            ]
          INACTIVE_ACCOUNT_EXPORT_LAMBDA_NAME: !Sub
            - "${EnvironmentName}-inactive-account-data-export-lambda"
            - EnvironmentName:
                !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]
          INACTIVE_ACCOUNT_EXPORT_MAX_ITEMS_PER_SEGMENT:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              inactiveAccountExportMaxItemsPerSegment,
            ]
          INACTIVE_ACCOUNT_EXPORT_PAUSE_BETWEEN_INVOCATIONS_MS:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              inactiveAccountExportPauseBetweenInvocationsMs,
            ]
      Policies:
        - !Ref LambdaBasicExecutionPolicy
        - !Ref DynamoUserReadAccessPolicy
        - !Ref DynamoCredentialReadAccessPolicy
        - !Ref CloudWatchLogsKmsAccessPolicy
        - !Ref InactiveAccountDataExportSelfInvokePolicy
      AutoPublishAlias: live
      LoggingConfig:
        LogGroup: !Ref InactiveAccountDataExportLogGroup
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - Fn::ImportValue: !Sub "${VpcStackName}-PrivateSubnetIdA"
          - Fn::ImportValue: !Sub "${VpcStackName}-PrivateSubnetIdB"
      Tags:
        Name: !Sub
          - "${EnvironmentName}-inactive-account-data-export-lambda"
          - EnvironmentName:
              !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]
        Environment:
          !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]

  InactiveAccountDataExportLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub
        - "/aws/lambda/${EnvironmentName}-inactive-account-data-export-lambda"
        - EnvironmentName:
            !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]
      RetentionInDays: !If
        - UseSubEnvironment
        - !FindInMap [
            EnvironmentConfiguration,
            !Ref SubEnvironment,
            logRetentionDays,
          ]
        - !FindInMap [
            EnvironmentConfiguration,
            !Ref Environment,
            logRetentionDays,
          ]
      KmsKeyId: !GetAtt MainKmsKey.Arn

  InactiveAccountDataExportLogSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Condition: IsSplunkEnabled
    Properties:
      LogGroupName: !Ref InactiveAccountDataExportLogGroup
      FilterPattern: ""
      DestinationArn: !Ref LoggingSubscriptionEndpointArn

  InactiveAccountDataExportSelfInvokePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: lambda:InvokeFunction
            Resource: !Sub
              - "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${EnvironmentName}-inactive-account-data-export-lambda"
              - EnvironmentName:
                  !If [UseSubEnvironment, !Ref SubEnvironment, !Ref Environment]
